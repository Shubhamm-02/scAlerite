services:
  - type: web
    name: scalerite-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false # You will paste this securely in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # You will paste this securely in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.10.12" # Enforce a stable Python version
